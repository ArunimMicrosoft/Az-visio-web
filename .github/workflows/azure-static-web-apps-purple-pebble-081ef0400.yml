name: Azure Static Web Apps CI/CD - AzureArchitectureDesignerWeb

on:
  push:
    branches:
      - main
      - master
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
      - master
  workflow_dispatch:

env:
  AZURE_STATIC_WEB_APP_NAME: azurearchitecturedesignerweb
  RESOURCE_GROUP: Application-website
  NODE_VERSION: '18'

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    environment:
      name: production
      url: https://purple-pebble-081ef0400.4.azurestaticapps.net
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: |
          echo "📦 Installing dependencies for ${{ env.AZURE_STATIC_WEB_APP_NAME }}..."
          npm ci
          echo "✅ Dependencies installed successfully"

      - name: Build Application
        run: |
          echo "🏗️ Building Azure Architecture Designer Web..."
          npm run build
          echo "✅ Build completed successfully"
          echo "📂 Build output:"
          ls -la build/

      - name: Verify Build Output
        run: |
          if [ ! -f "build/index.html" ]; then
            echo "❌ Error: build/index.html not found!"
            exit 1
          fi
          echo "✅ Build output verified"
          echo "📊 Build size: $(du -sh build/ | awk '{print $1}')"
          echo "📁 Resource Group: ${{ env.RESOURCE_GROUP }}"
          echo "🌐 Static Web App: ${{ env.AZURE_STATIC_WEB_APP_NAME }}"

      - name: Deploy to Azure Static Web Apps
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_PURPLE_PEBBLE_081EF0400 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          skip_app_build: true
          app_location: "/"
          api_location: ""
          output_location: "build"
          production_branch: "main"

      - name: Deployment Summary
        if: success()
        run: |
          echo "✅ Deployment successful!"
          echo "🌐 Static Web App: ${{ env.AZURE_STATIC_WEB_APP_NAME }}"
          echo "📦 Resource Group: ${{ env.RESOURCE_GROUP }}"
          echo "🔗 Live URL: https://purple-pebble-081ef0400.4.azurestaticapps.net"
          echo "📅 Deployed: $(date -u +"%Y-%m-%d %H:%M:%S UTC")"

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_PURPLE_PEBBLE_081EF0400 }}
          action: "close"
