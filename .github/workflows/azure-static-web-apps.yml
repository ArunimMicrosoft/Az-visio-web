name: Azure Static Web Apps CI/CD

# Triggers: push to main/master, PRs against main/master, and manual dispatch
on:
  push:
    branches:
      - main
      - master
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
      - master
  workflow_dispatch:

# Permissions for OIDC token (Azure federated credentials)
permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  NODE_VERSION: '20'
  BUILD_OUTPUT: 'build'

jobs:
  # ──────────────────────────────────────────────────
  # Job 1: Build, Lint, and Deploy
  # ──────────────────────────────────────────────────
  build_and_deploy:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    name: Build & Deploy

    steps:
      # ── Checkout ──
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      # ── Setup Node.js with caching ──
      - name: 🟢 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      # ── Install dependencies ──
      - name: 📦 Install dependencies
        run: npm ci

      # ── Lint (non-blocking on warnings) ──
      - name: 🔍 Lint check
        run: npm run lint -- --max-warnings 50
        continue-on-error: true

      # ── Build ──
      - name: 🏗️ Build application
        run: npm run build
        env:
          CI: true

      # ── Verify build output ──
      - name: ✅ Verify build output
        run: |
          if [ ! -f "${{ env.BUILD_OUTPUT }}/index.html" ]; then
            echo "❌ Error: ${{ env.BUILD_OUTPUT }}/index.html not found!"
            exit 1
          fi

          # Report build size
          echo "📊 Build Output Summary:"
          echo "──────────────────────────"
          du -sh ${{ env.BUILD_OUTPUT }}/ | awk '{print "Total: " $1}'
          echo ""
          echo "📂 Assets:"
          ls -lh ${{ env.BUILD_OUTPUT }}/assets/ 2>/dev/null || echo "  (no assets folder)"
          echo ""
          echo "✅ Build verified successfully"

      # ── Deploy to Azure Static Web Apps ──
      - name: 🚀 Deploy to Azure Static Web Apps
        id: deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_BLUE_WAVE_09EE22700 }}
          action: "upload"
          app_location: "/"
          api_location: ""
          output_location: ${{ env.BUILD_OUTPUT }}
          skip_app_build: true  # We already built above for better control

      # ── Post-deployment summary ──
      - name: 📋 Deployment Summary
        if: success()
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════╗"
          echo "║  ✅  DEPLOYMENT SUCCESSFUL                       ║"
          echo "╠══════════════════════════════════════════════════╣"
          echo "║  🌐 URL: https://blue-wave-09ee22700.azurestaticapps.net"
          echo "║  📦 Node: ${{ env.NODE_VERSION }}"
          echo "║  🔀 Branch: ${{ github.ref_name }}"
          echo "║  📝 Commit: ${{ github.sha }}"
          echo "║  👤 Author: ${{ github.actor }}"
          echo "╚══════════════════════════════════════════════════╝"

      # ── Notify on failure ──
      - name: ❌ Deployment Failed
        if: failure()
        run: |
          echo "❌ Deployment failed!"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "Check the logs above for details."

  # ──────────────────────────────────────────────────
  # Job 2: Close PR staging environment
  # ──────────────────────────────────────────────────
  close_pull_request:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close PR Environment
    steps:
      - name: 🧹 Close Pull Request staging environment
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_BLUE_WAVE_09EE22700 }}
          action: "close"
