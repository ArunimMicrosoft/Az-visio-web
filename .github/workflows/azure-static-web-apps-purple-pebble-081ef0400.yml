name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
      - master
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
      - master
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  # ──────────────────────────────────────────────────────────────
  # BUILD + DEPLOY  (push / PR open / manual trigger)
  # ──────────────────────────────────────────────────────────────
  build_and_deploy_job:
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && github.event.action != 'closed') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    name: Build and Deploy
    environment:
      name: production
      url: https://purple-pebble-081ef0400.4.azurestaticapps.net

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      # Let the SWA action run Oryx to build — it only uploads build output, not node_modules
      - name: 🚀 Build and Deploy to Azure Static Web Apps
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_PURPLE_PEBBLE_081EF0400 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: /
          api_location: api
          output_location: build
          production_branch: main
          app_build_command: "npm install && npm run build"
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_RAZORPAY_KEY_ID: ${{ secrets.VITE_RAZORPAY_KEY_ID }}

      - name: 🎉 Deployment summary
        if: success()
        run: |
          echo "✅ Deployed to https://purple-pebble-081ef0400.4.azurestaticapps.net"

  # ──────────────────────────────────────────────────────────────
  # CLOSE staging environment when a PR is merged/closed
  # ──────────────────────────────────────────────────────────────
  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Environment
    steps:
      - name: 🧹 Close staging environment
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_PURPLE_PEBBLE_081EF0400 }}
          action: close
          app_location: /
