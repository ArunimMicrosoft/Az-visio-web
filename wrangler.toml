# Cloudflare Pages project config
# Used by `wrangler pages dev` for local testing of Pages Functions
name = "cloudcanvas"
compatibility_date = "2025-05-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "build"

# Environment variables for local dev (production vars set in Cloudflare dashboard)
# Do NOT commit secrets here — use `.dev.vars` for local secrets
[vars]
NODE_VERSION = "20"
