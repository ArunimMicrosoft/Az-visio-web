name: Deploy to Azure App Service

# Disabled: Using Azure Static Web Apps instead (azure-static-web-apps.yml)
# To re-enable: uncomment the triggers below and add AZURE_WEBAPP_PUBLISH_PROFILE secret
# Steps to get publish profile:
#   1. Go to Azure Portal → App Service → "azure-architecture-designer"
#   2. Click "Download publish profile" 
#   3. Go to GitHub → Settings → Secrets → Actions → New secret
#   4. Name: AZURE_WEBAPP_PUBLISH_PROFILE, Value: paste the XML content
on:
  workflow_dispatch:  # Manual trigger only — won't auto-run on push

permissions:
  contents: read

env:
  AZURE_WEBAPP_NAME: azure-architecture-designer
  AZURE_WEBAPP_PACKAGE_PATH: './build'
  NODE_VERSION: '20'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    name: Build & Deploy to App Service

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔍 Lint check
        run: npm run lint -- --max-warnings 50
        continue-on-error: true

      - name: 🏗️ Build application
        run: npm run build
        env:
          CI: true

      - name: ✅ Verify build output
        run: |
          if [ ! -f "build/index.html" ]; then
            echo "❌ Error: build/index.html not found!"
            exit 1
          fi
          echo "📊 Build size: $(du -sh build/ | awk '{print $1}')"
          echo "✅ Build verified"

      - name: 🚀 Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}

      - name: 📋 Deployment Summary
        if: success()
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════╗"
          echo "║  ✅  APP SERVICE DEPLOYMENT SUCCESSFUL            ║"
          echo "╠══════════════════════════════════════════════════╣"
          echo "║  🌐 URL: https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net"
          echo "║  📦 Node: ${{ env.NODE_VERSION }}"
          echo "║  🔀 Branch: ${{ github.ref_name }}"
          echo "║  📝 Commit: ${{ github.sha }}"
          echo "╚══════════════════════════════════════════════════╝"
